server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── 安全响应头 ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 预压缩文件优先（Vite 构建产出的 .gz / .br 文件） ──
    gzip_static on;
    brotli_static on;

    # ── 实时 gzip 压缩（兜底未预压缩的资源） ──
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        application/vnd.ms-fontobject
        font/ttf
        font/otf;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # ── 静态资源长缓存（Vite 构建产物带 hash） ──
    # Vite 输出目录: static/js/ static/css/ static/[ext]/
    location ~* ^/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 预压缩文件需要保留安全头（location 块内 add_header 会覆盖外层）
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── API 反向代理到后端 FastAPI 服务 ──
    location /api/ {
        proxy_pass http://hello-fastapi:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        # 支持 WebSocket（未来扩展用）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── SPA 路由：所有非文件请求回退到 index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 禁止访问隐藏文件 ──
    location ~ /\. {
        deny all;
    }

    # ── 禁止访问敏感文件类型 ──
    location ~* \.(md|log)$ {
        deny all;
    }

    # ── 错误页面 ──
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
