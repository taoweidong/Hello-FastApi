services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hello-fastapi-web
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hello-fastapi-net

networks:
  hello-fastapi-net:
    external: true
    name: hello-fastapi-net
