[mypy]
python_version = 3.10
show_error_codes = True
show_column_numbers = True
show_error_context = True
pretty = True
ignore_missing_imports = True
strict = False
warn_unused_configs = True
warn_return_any = False
no_implicit_optional = True
check_untyped_defs = True
disallow_untyped_defs = False
disallow_any_generics = False

[mypy-sqlmodel.*]
ignore_errors = True

[mypy-fastapi.*]
ignore_errors = True

[mypy-pydantic.*]
ignore_errors = True

[mypy-jose.*]
ignore_errors = True

[mypy-redis.*]
ignore_errors = True

[mypy-loguru.*]
ignore_errors = True

[mypy-fastcrud.*]
ignore_errors = True

[mypy-src.infrastructure.*]
ignore_errors = True

[mypy-cli]
ignore_errors = True

[mypy-verify_api]
ignore_errors = True

[mypy-tests.*]
ignore_errors = True
