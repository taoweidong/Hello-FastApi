[mypy]
strict = True
python_version = 3.10
show_error_codes = True
show_column_numbers = True
show_error_context = True
pretty = True
ignore_missing_imports = True

[mypy-sqlmodel.*]
ignore_errors = True

[mypy-fastapi.*]
ignore_errors = True

[mypy-pydantic.*]
ignore_errors = True

[mypy-jose.*]
ignore_errors = True

[mypy-passlib.*]
ignore_errors = True

[mypy-redis.*]
ignore_errors = True

[mypy-loguru.*]
ignore_errors = True

[mypy-fastcrud.*]
ignore_errors = True
